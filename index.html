<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <title>Loja</title>
</head>

<body class="bg-dark">
    <div class="container py-5">
        <h1 class="text-center mb-4 text-light">Produtos da Loja</h1>
        <div class="row">
            <!-- Card 1 -->
            <div class="col-md-4 mb-3 w-auto">
                <div class="card">
                    <figure class="p-4">
                        <img class="card-img-top" src="./imagem.png" alt="blusa preta">
                    </figure>
                    <div class="card-body text-center">
                        <h5 class="card-title">Blusa Preta</h5>
                        <h5 class="alert alert-info py-2" role="alert">R$ 40,00</h5>
                        <a href="#" class="btn btn-primary w-100">Comprar</a>
                    </div>
                </div>
            </div>

            <!-- Card 2 -->
            <div class="col-md-4 mb-3 w-auto">
                <div class="card">
                    <figure class="p-4">
                        <img class="card-img-top" src="./imagem2.png" alt="calça jeans">
                    </figure>
                    <div class="card-body text-center">
                        <h5 class="card-title">Calça Jeans</h5>
                        <h5 class="alert alert-info py-2" role="alert">R$ 120,00</h5>
                        <a href="#" class="btn btn-primary w-100">Comprar</a>
                    </div>
                </div>
            </div>

            <!-- Card 3 -->
            <div class="col-md-4 mb-3 w-auto">
                <div class="card">
                    <figure class="p-4">
                        <img class="card-img-top" src="./imagem3.png" alt="moletom preto">
                    </figure>
                    <div class="card-body text-center">
                        <h5 class="card-title">Moletom Preto</h5>
                        <h5 class="alert alert-warning py-2" role="alert">R$ 50,00</h5>
                        <a href="#" class="btn btn-primary w-100">Comprar</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
